# GoReleaser v2 configuration for quicsql.net → github.com/quicsql/quicsql.
#
# Flow: .github/workflows/release.yml runs `goreleaser release --clean` on a
# v* tag, producing cross-platform archives, checksums, a GitHub release with
# changelog, and multi-arch images at ghcr.io/quicsql/quicsql.
#
# PRECONDITION: go.mod must be free of local filesystem replace directives
# (the co-dev `replace gosqlite.org => ../../sqlite` set) — the release
# workflow hard-gates on that before this config ever runs, because a runner
# has no sibling checkout and a release must pin published versions anyway.
#
# Validate edits with `goreleaser check`.

version: 2

project_name: quicsql

before:
  hooks:
    # Only sound once the replaces are gone (see the gate in release.yml);
    # with them present this would fail on the missing ../../sqlite checkout.
    - go mod download

builds:
  - id: quicsql
    main: ./cmd/quicsql
    binary: quicsql
    env:
      # gosqlite is CGo-free, so every target is a pure cross-compile —
      # no C toolchain anywhere in the matrix (mirrors `just dist`).
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags:
      # Reproducibility: strip local path prefixes from the binary.
      - -trimpath
    # Reproducibility: stamp file modtimes with the commit time, not build time.
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      # -s -w strips the symbol table and DWARF for a smaller binary; -X stamps
      # the version (cmd/quicsql exposes `var version` + a --version flag) so
      # `quicsql --version` reports the release tag.
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    # tar.gz everywhere, zip for Windows where tar is not native.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Ship the license and readme alongside the binary.
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  # Conventional-commit-style grouping; anything unmatched lands in Other,
  # so non-conventional messages still show up rather than vanish.
  groups:
    - title: Features
      regexp: '^.*feat[(\w)]*:'
      order: 0
    - title: Fixes
      regexp: '^.*fix[(\w)]*:'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

# Docker images via the prebuilt-binary flow: GoReleaser copies the already
# cross-compiled linux binary for each arch into a minimal build context next
# to ./Dockerfile (which just COPYies it in — nothing compiles inside docker),
# builds one single-arch image per entry, and the docker_manifests below
# stitch them into the multi-arch tags users actually pull.
#
# `goreleaser check` notes that dockers/docker_manifests are being phased out
# in favor of dockers_v2; they remain fully supported throughout v2, so this
# stays on the classic flow for now (migrating means a $TARGETPLATFORM-aware
# Dockerfile — do both together when GoReleaser sets a removal date).
dockers:
  - id: linux-amd64
    use: buildx
    goos: linux
    goarch: amd64
    ids: [quicsql]
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/quicsql/quicsql:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=CGo-free SQLite network server"
      - "--label=org.opencontainers.image.url=https://github.com/quicsql/quicsql"
      - "--label=org.opencontainers.image.source=https://github.com/quicsql/quicsql"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
  - id: linux-arm64
    use: buildx
    goos: linux
    goarch: arm64
    ids: [quicsql]
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/quicsql/quicsql:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=CGo-free SQLite network server"
      - "--label=org.opencontainers.image.url=https://github.com/quicsql/quicsql"
      - "--label=org.opencontainers.image.source=https://github.com/quicsql/quicsql"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/quicsql/quicsql:{{ .Version }}"
    image_templates:
      - "ghcr.io/quicsql/quicsql:{{ .Version }}-amd64"
      - "ghcr.io/quicsql/quicsql:{{ .Version }}-arm64"
  - name_template: "ghcr.io/quicsql/quicsql:latest"
    image_templates:
      - "ghcr.io/quicsql/quicsql:{{ .Version }}-amd64"
      - "ghcr.io/quicsql/quicsql:{{ .Version }}-arm64"

# Homebrew FORMULA pushed to the tap repo — a formula, not a cask, because
# `brew services` only manages formulae with a `service` block, and running
# the server under launchd (macOS) / systemd (Linux) is the point:
# `brew services start quicsql`. GoReleaser deprecates `brews` (soft v2.10,
# full v2.16) in favor of `homebrew_casks`, but casks cannot declare services,
# so this stays a formula until GoReleaser v3 forces a rethink. Upsides vs the
# cask it replaced: works on Homebrew-on-Linux too, and needs no quarantine
# xattr hook (formula downloads never get the attribute). Gated: with no
# HOMEBREW_TAP_GITHUB_TOKEN the formula is still generated but not uploaded,
# so a release never fails for want of the tap.
brews:
  - name: quicsql
    repository:
      owner: quicsql
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    skip_upload: '{{ if .Env.HOMEBREW_TAP_GITHUB_TOKEN }}false{{ else }}true{{ end }}'
    homepage: "https://github.com/quicsql/quicsql"
    description: "CGo-free SQLite network server (native JSON + libSQL Hrana)"
    license: Apache-2.0
    commit_author:
      name: goreleaser-bot
      email: bot@quicsql.net
    install: |
      bin.install "quicsql"
    # Seed a minimal localhost-only config on first install: the service block
    # points at it, and without one launchd would crash-loop the service on a
    # missing file. Guarded so an edited config is never overwritten.
    post_install: |
      (var/"quicsql").mkpath
      (var/"log").mkpath
      unless (etc/"quicsql/quicsql.yaml").exist?
        (etc/"quicsql").mkpath
        (etc/"quicsql/quicsql.yaml").write <<~EOS
          # quicSQL config, seeded by Homebrew — localhost-only HTTP/1.1, no TLS,
          # no auth, no databases yet. Docs: https://github.com/quicsql/quicsql
          # After editing: brew services restart quicsql
          server:
            data_dir: #{var}/quicsql
          listeners:
            - {name: h1, transport: h1, address: 127.0.0.1:7775}
        EOS
      end
    service: |
      run [opt_bin/"quicsql", "-config", etc/"quicsql/quicsql.yaml"]
      keep_alive true
      working_dir var/"quicsql"
      log_path var/"log/quicsql.log"
      error_log_path var/"log/quicsql.log"
    test: |
      system "#{bin}/quicsql", "-version"
    caveats: |
      Config: #{etc}/quicsql/quicsql.yaml (edit, then `brew services restart quicsql`)
      Data:   #{var}/quicsql
      Logs:   #{var}/log/quicsql.log

      Run as a background service:
        brew services start quicsql

release:
  github:
    owner: quicsql
    name: quicsql
  # Make workflow re-runs idempotent: a failed publish leaves a partial
  # release, and the retry would otherwise 422 (already_exists) on every
  # asset the first attempt managed to upload.
  replace_existing_artifacts: true

snapshot:
  # Local `goreleaser release --snapshot` builds get an unambiguous dev version.
  version_template: "{{ incpatch .Version }}-dev"
