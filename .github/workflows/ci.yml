# CI for quicsql.net (github.com/quicsql/quicsql).
#
# go.mod pins published gosqlite.org* versions (no filesystem replaces), so CI
# builds against the released engine directly — the full gate below (build / test
# / race / lint / examples / cross-build). To build against the sibling gosqlite
# checkout during co-development, run `just codev` locally (a gitignored go.work
# overlay); release.yml hard-gates on no `replace` ever reaching go.mod.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Newer pushes to the same branch/PR cancel older, still-running checks.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build + test on the platforms consumers run on, for the supported Go line.
  # quicsql needs Go 1.26 (native h2c via http.Protocols), so 1.26.x is the floor;
  # add newer lines here as they ship. The engine is pure Go (no C toolchain).
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.26.x"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          go-version: ${{ matrix.go }}
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -count=1 -timeout 10m ./...

  # Race detector — linux/amd64 is enough; the locking surface is platform-
  # independent Go. Matches `just test-race` (quicsql's internal/raceskip skips
  # the few checkptr-sensitive C paths, so no global checkptr disable is needed).
  race:
    name: race
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: go test -race
        run: go test -race -count=1 -timeout 15m ./...

  # Static analysis — the same checks as `just lint` (gofmt, go vet,
  # staticcheck, golangci-lint v2, gopls modernize), so CI and local lint agree.
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: gofmt
        run: |
          out=$(gofmt -l $(find . -name '*.go' -not -path './.*/*'))
          if [ -n "$out" ]; then echo "these files need gofmt:"; echo "$out"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0
          "$(go env GOPATH)/bin/golangci-lint" run --timeout 5m --config .golangci.yml ./...
      - name: gopls modernize
        run: |
          out=$(go run golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@latest ./... 2>&1 \
            | grep -v '^exit status' | grep -v '^go: ' || true)
          if [ -n "$out" ]; then echo "$out"; exit 1; fi

  # Smoke-test the runnable examples end to end (all SQLite-backed, no external
  # services): the self-contained demo + auth matrices, then the two-process
  # showcase (the charged server + the remote tour over TLS/mTLS) — the same flow
  # as `just showcase`, inlined so CI needs no `just`.
  examples:
    name: examples
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: build every example
        run: go build ./examples/...
      - name: demo (bench across every transport)
        run: go run ./examples/demo -dur 1s
      - name: auth matrix (cleartext + TLS)
        run: |
          go run ./examples/auth
          go run ./examples/auth -tls
      - name: showcase (charged server + remote tour, over TLS/mTLS)
        run: |
          set -euo pipefail
          dir=$(mktemp -d)
          trap 'kill "${srv:-0}" 2>/dev/null || true; wait 2>/dev/null || true' EXIT
          go build -o "$dir/charged" ./examples/charged-server
          "$dir/charged" -bind 127.0.0.1 -hosts localhost,127.0.0.1 -data "$dir/data" >"$dir/server.log" 2>&1 &
          srv=$!
          up=""
          for _ in $(seq 1 40); do curl -sf http://127.0.0.1:7775/_health >/dev/null 2>&1 && { up=1; break; }; sleep 0.25; done
          if [ -z "$up" ]; then echo "charged server did not come up:"; cat "$dir/server.log"; exit 1; fi
          go run ./examples/remote-tour -addr localhost:7777

  # Compile-only across the release target matrix (CGo-free ⇒ pure cross-compile),
  # so platform-specific compile errors surface without a runtime there. Mirrors
  # `just cross-build`; covers Windows, which the test job doesn't run.
  cross-build:
    name: cross-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: cross-compile every target
        run: |
          set -e
          for triple in \
            darwin/amd64 darwin/arm64 \
            linux/386 linux/amd64 linux/arm linux/arm64 \
            windows/386 windows/amd64 windows/arm64; \
          do
            os=${triple%/*}; arch=${triple#*/}
            printf '  %-16s ' "$triple"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build ./... && echo ok
          done
