name: Setup
description: >
  Standard Go setup for this module's CI jobs. go.mod pins published gosqlite.org*
  versions (no filesystem replaces), so CI builds against the released engine
  directly — no sibling checkout needed. Centralizes the Go-version pin so a single
  edit here propagates to every job; the test matrix overrides go-version.

inputs:
  go-version:
    description: Go toolchain version (e.g. "1.26.x"). Tracks go.mod's go directive.
    required: false
    default: "1.26.x"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: go.sum
