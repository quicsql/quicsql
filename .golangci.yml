# golangci-lint config for quicsql.net (the network server + client).
#
# quicsql is ordinary, CGo-free Go — no unsafe.Pointer arithmetic, no ported
# modernc/glebarez files — so this keeps the default linter set on with only the
# few exclusions a server codebase genuinely needs (deferred-Close cleanup, and the
# usual test/example brevity).

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    staticcheck:
      checks:
        - all

    errcheck:
      # Deferred/cleanup closers where a prior error has already short-circuited the
      # caller, or the close is best-effort. Excluding the specific functions keeps
      # errcheck's value on the calls that matter (unchecked Commit/Exec/Put/…).
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.Conn).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (io.Closer).Close
        - (net.Conn).Close
        - (net.Listener).Close
        - os.Remove
        - os.RemoveAll
        - (*os.File).Close
        # gosqlite handles quicsql opens/closes on backend teardown paths.
        - (*gosqlite.org.DB).Close
        - (*gosqlite.org.Blob).Close

  exclusions:
    rules:
      # Tests occasionally ignore errors on cleanup deliberately (closing a row
      # whose query already errored, shutting a test server down, etc.).
      - linters: [errcheck]
        path: "_test\\.go"

      # Examples are illustrative; brevity outweighs error-checking ceremony around
      # `defer db.Close()` and the like.
      - linters: [errcheck]
        path: "(^|/)examples?/"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
